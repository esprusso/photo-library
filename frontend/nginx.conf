server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
    
    # Allow larger uploads for cover images (15MB, app enforces 10MB)
    client_max_body_size 15M;
    
    # Allow mixed content for local development
    add_header Content-Security-Policy "" always;
    add_header X-Content-Type-Options "" always;
    
    # Handle both HTTP and HTTPS properly
    proxy_set_header X-Forwarded-Proto $scheme;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # Re-assert body size within this location (some nginx builds require it per-location)
        client_max_body_size 15M;
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Handle /api/images without trailing slash specifically
    location = /api/images {
        proxy_pass http://backend:8000/api/images/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Pass-through paths (preserve upstream path exactly)
    location /thumbnails/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /download/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
}
