version: '3.8'

services:
  db:
    image: postgres:15
    container_name: gif-library-db
    environment:
      POSTGRES_DB: gif_library
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: GifLib2024!
      TZ: "Etc/UTC"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - gif-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: gif-library-backend:latest
    container_name: gif-library-backend
    # Backend is only accessible inside the Docker network; no host port mapping
    environment:
      LIBRARY_PATHS: /library,/clips
      DB_URL: postgresql://postgres:GifLib2024!@db:5432/gif_library
      PYTHONUNBUFFERED: 1
      TZ: "Etc/UTC"
      THUMBNAILS_DIR: /data/thumbnails
      DOWNLOADS_DIR: /data/downloads
      MEDIA_DIR: /data/media
      ENABLE_FFMPEG_FALLBACK: "true"
      # Enhanced thumbnail configuration
      THUMBNAIL_SIZE: 256
      THUMBNAIL_SCALE: 2
      ENABLE_3X_DPR: "false"
      ANIMATED_PREVIEW_FORMAT: "auto"
      HOVER_PRELOAD_DELAY_MS: 100
      # Import watcher
      IMPORT_WATCH_ENABLED: "true"
      IMPORT_WATCH_INTERVAL_SECONDS: 60
      # Performance optimizations
      MAX_WORKERS: 2
      THUMBNAIL_BATCH_SIZE: 10
      # Set to 'true' to exclude RAW files (ARW, RAF, CR2, etc.) for better performance
      EXCLUDE_RAW_FILES: 'false'
    volumes:
      # Mount your photo library directory here - replace with your actual path
      # Example for Synology: - "/volume1/photos:/library:ro"
      # Example for generic NAS: - "/path/to/your/photos:/library:ro"
      - "${LIBRARY_HOST_PATH:-./data/test-library}:/library:ro"
      - "${CLIPS_HOST_PATH:-./data/test-clips}:/clips:ro"
      - "./data:/data"
      # Bind host ffmpeg binary into the container for video preview generation (optional)
      # Comment out if ffmpeg is not available on your system
      # - "/usr/bin/ffmpeg:/usr/local/bin/ffmpeg:ro"
    networks:
      - gif-network
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: gif-library-frontend:latest
    container_name: gif-library-frontend
    ports:
      - "8087:80"
    environment:
      TZ: "Etc/UTC"
      # Frontend GIF Library configuration
      VITE_HOVER_PRELOAD_DELAY_MS: 100
      VITE_ENABLE_3X_DPR: "false"
      VITE_DEFAULT_GRID_SIZE: "medium"
    networks:
      - gif-network
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:

networks:
  gif-network:
    driver: bridge
